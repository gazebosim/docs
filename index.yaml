# This file is the master manifest and configuration for the documentation website.
# It defines the releases, their included libraries, and general library metadata
# used to generate the site content and navigation.
#
# For more information about the structure of this file, see the README.md file at the root of the repository.
#
# Components of the file:
#
# 1. "releases:" A list of releases to display on the website.
#    Each release has:
#    - "name:" The name of the release (e.g., jetty, ionic).
#    - "lts:", "dev:", "eol:", "preferred:": Booleans indicating release status.
#    - "description:" Support period description.
#    - "libraries:" A list of libraries included in the release, with their major versions.
#      This list is used to generate the "Library Reference" navigation in the sidebar
#      (see build_multiversion.py) and to populate links in "library_howtos.md"
#      via MyST substitutions (see conf.py).
#
# 2. "library_info:" A dictionary containing descriptions of each library.
#    This is used to populate the /libs page.

